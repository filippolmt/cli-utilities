version: 2
project_name: changedetection-pp-cli
changelog:
  disable: true
builds:
  - id: changedetection-pp-cli
    main: ./cmd/changedetection-pp-cli
    binary: changedetection-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X changedetection-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: changedetection-pp-mcp
    main: ./cmd/changedetection-pp-mcp
    binary: changedetection-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: changedetection-pp-cli
    repository:
      owner: filippolmt
      name: homebrew-tap
    homepage: "https://github.com/filippolmt/changedetection-pp-cli"
    description: "Every changedetection.io watch, tag, and notification from one CLI — plus offline cross-watch queries the web UI can't do."
    install: |
      bin.install "changedetection-pp-cli"
      bin.install "changedetection-pp-mcp"
